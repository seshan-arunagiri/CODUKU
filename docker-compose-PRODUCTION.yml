services:
  # ===== NGINX API GATEWAY (Port 80) =====
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      judge:
        condition: service_healthy
      leaderboard:
        condition: service_healthy
      mentor:
        condition: service_healthy
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===== AUTH SERVICE (Port 8001) =====
  auth:
    build:
      context: ./backend
      dockerfile: services/auth_service/Dockerfile
    environment:
      SERVICE_NAME: auth
      SERVICE_PORT: 8001
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here}
      UPSTASH_REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===== JUDGE0 EXECUTION ENGINE (Port 2358) - Critical Service =====
  judge0:
    image: judge0/judge0:latest
    ports:
      - "2358:2358"
    restart: unless-stopped
    networks:
      - coduku
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JUDGE0_WORKERS: 4
      JUDGE0_CPU_TIME_LIMIT: 5
      JUDGE0_MEMORY_LIMIT: 262144
      RAILS_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coduku
      REDIS_URL: redis://redis:6379/0
    volumes:
      - judge0_data:/var/lib/judge0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2358/"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 120s

  # ===== JUDGE SERVICE (Port 8002) - Code Execution Wrapper =====
  judge:
    build:
      context: ./backend
      dockerfile: services/judge_service/Dockerfile
    environment:
      SERVICE_NAME: judge
      SERVICE_PORT: 8002
      JUDGE0_URL: http://judge0:2358
      LEADERBOARD_URL: http://leaderboard:8003
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/coduku
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here}
    ports:
      - "8002:8002"
    depends_on:
      judge0:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ===== LEADERBOARD SERVICE (Port 8003) - Rankings =====
  leaderboard:
    build:
      context: ./backend
      dockerfile: services/leaderboard_service/Dockerfile
    environment:
      SERVICE_NAME: leaderboard
      SERVICE_PORT: 8003
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/coduku
      REDIS_URL: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ===== MENTOR/AI SERVICE (Port 8004) - AI Help =====
  mentor:
    build:
      context: ./backend
      dockerfile: services/mentor_service/Dockerfile
    environment:
      SERVICE_NAME: mentor
      SERVICE_PORT: 8004
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHROMADB_URL: http://chromadb:8000
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/coduku
      REDIS_URL: redis://redis:6379/3
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here}
    ports:
      - "8004:8004"
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ===== REDIS CACHE (Port 6379) =====
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - coduku
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ===== POSTGRESQL DATABASE (Port 5432) =====
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coduku
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - coduku
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ===== CHROMADB VECTOR STORE (Port 8000) =====
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8000:8000"
    environment:
      ALLOW_RESET: "TRUE"
    volumes:
      - chromadb_data:/chroma/chroma_data
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ===== FRONTEND (Port 3000 -> 80 via Docker, Port 80 via NGINX) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost/api/v1
      REACT_APP_WS_URL: ws://localhost/ws
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  judge0_data:

networks:
  coduku:
    driver: bridge
