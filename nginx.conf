user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth:8001;
    }
    
    upstream judge_service {
        server judge:8002;
    }
    
    upstream leaderboard_service {
        server leaderboard:8003;
    }
    
    upstream mentor_service {
        server mentor:8004;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        # Auth routes
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
        }
        
        # Judge routes
        location /api/v1/submissions/ {
            proxy_pass http://judge_service;
            proxy_buffering off;
        }

        # Problem/question routes (judge service)
        location /api/v1/questions/ {
            proxy_pass http://judge_service;
            proxy_buffering off;
        }
        
        # Leaderboard routes
        location /api/v1/leaderboards/ {
            proxy_pass http://leaderboard_service;
            proxy_buffering off;
        }
        
        # Mentor/AI routes
        location /api/v1/mentor/ {
            proxy_pass http://mentor_service;
            proxy_buffering off;
        }
        
        # WebSocket upgrade (canonical /ws/{client_id})
        location /ws/ {
            proxy_pass http://judge_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }

        # Backwards‑compatible WebSocket path used by old frontend:
        # /api/v1/ws/leaderboard  →  /ws/leaderboard on judge service
        location /api/v1/ws/ {
            proxy_pass http://judge_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }
}
