services:
  # ===== NGINX API GATEWAY =====
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - judge
      - leaderboard
      - mentor
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===== AUTH SERVICE (Port 8001) =====
  auth:
    build:
      context: ./backend
      dockerfile: services/auth_service/Dockerfile
    environment:
      SERVICE_NAME: auth
      SERVICE_PORT: 8001
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      # Microservice config expects UPSTASH_REDIS_URL; point it at local Redis.
      UPSTASH_REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - postgres
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===== JUDGE SERVICE (Port 8002) =====
  judge:
    build:
      context: ./backend
      dockerfile: services/judge_service/Dockerfile
    environment:
      SERVICE_NAME: judge
      SERVICE_PORT: 8002
      JUDGE0_URL: http://judge0:2358
      LEADERBOARD_URL: http://leaderboard:8003
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      UPSTASH_REDIS_URL: redis://redis:6379/1
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/coduku
    ports:
      - "8002:8002"
    depends_on:
      judge0:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ===== LEADERBOARD SERVICE (Port 8003) =====
  leaderboard:
    build:
      context: ./backend
      dockerfile: services/leaderboard_service/Dockerfile
    environment:
      SERVICE_NAME: leaderboard
      SERVICE_PORT: 8003
      UPSTASH_REDIS_URL: redis://redis:6379/2
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/coduku
    ports:
      - "8003:8003"
    depends_on:
      - redis
      - postgres
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===== MENTOR/AI SERVICE (Port 8004) =====
  mentor:
    build:
      context: ./backend
      dockerfile: services/mentor_service/Dockerfile
    environment:
      SERVICE_NAME: mentor
      SERVICE_PORT: 8004
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHROMADB_URL: http://chromadb:8000
      UPSTASH_REDIS_URL: redis://redis:6379/3
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/coduku
    ports:
      - "8004:8004"
    depends_on:
      - chromadb
      - redis
      - postgres
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ===== JUDGE0 EXECUTION ENGINE =====
  judge0:
    image: judge0/judge0:latest
    ports:
      - "2358:2358"
    environment:
      JUDGE0_WORKERS: 4
      JUDGE0_CPU_TIME_LIMIT: 5
      JUDGE0_MEMORY_LIMIT: 262144
      RAILS_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coduku
    networks:
      - coduku
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2358/"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 120s
    restart: unless-stopped
    volumes:
      - judge0_data:/var/lib/judge0

  # ===== REDIS CACHE =====
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== POSTGRESQL DATABASE =====
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coduku
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - coduku
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== CHROMADB (Vector Store) =====
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8000:8000"
    environment:
      ALLOW_RESET: "TRUE"
    volumes:
      - chromadb_data:/chroma/chroma_data
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===== FRONTEND =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost/api/v1
      REACT_APP_WS_URL: ws://localhost/ws
    depends_on:
      - gateway
    networks:
      - coduku
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
  chromadb_data:
  judge0_data:

networks:
  coduku:
    driver: bridge
